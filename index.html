<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Akses SOP BPOPP</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h2 { color: #202124; margin-bottom: 10px; font-size: 22px; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #1557b0; }
        #error { color: #d93025; font-size: 13px; margin-top: 10px; display: none; }
        .loading { display: none; margin-top: 15px; font-style: italic; color: #1a73e8; }
    </style>
</head>
<body>

<div class="card">
    <h2>Akses Terproteksi</h2>
    <p>Masukkan kode akses untuk membuka Folder SOP BPOPP.</p>
    <input type="password" id="pass" placeholder="Password">
    <button onclick="verify()">Buka Folder</button>
    <p id="error">Password salah!</p>
    <div id="loading" class="loading">Memverifikasi...</div>
</div>

<script>
    function verify() {
        const input = document.getElementById('pass').value;
        const error = document.getElementById('error');
        const loading = document.getElementById('loading');

        // GANTI DI SINI
        const KODE_AKSES = "BPOPP2026"; 
        const LINK_DRIVE = "https://drive.google.com/drive/folders/1ZWPTCgW-rAI51jOatcoMzQFJ8dB4Bnq0?usp=drive_link";

        if (input === KODE_AKSES) {
            error.style.display = 'none';
            loading.style.display = 'block';
            
            // Memberi jeda sedikit agar terlihat seperti proses verifikasi sistem
            setTimeout(() => {
                window.location.href = LINK_DRIVE;
            }, 800);
        } else {
            error.style.display = 'block';
            document.getElementById('pass').value = "";
        }
    }

    // Support tombol Enter
    document.getElementById("pass").addEventListener("keyup", function(event) {
        if (event.key === "Enter") verify();
    });
</script>

</body>
</html>
